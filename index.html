/* ── LOGIN ─────────────────────────────────────── */
.login-shell{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);position:relative;overflow:hidden;padding:24px;
}
.login-bg-mesh{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 80% 60% at 20% 20%,rgba(79,142,247,.08) 0%,transparent 60%),
             radial-gradient(ellipse 60% 80% at 80% 80%,rgba(124,106,245,.07) 0%,transparent 60%),
             radial-gradient(ellipse 40% 40% at 60% 30%,rgba(62,207,178,.05) 0%,transparent 50%);
}
.login-grid{
  position:absolute;inset:0;pointer-events:none;opacity:.4;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:40px 40px;
}
.login-card{
  position:relative;z-index:1;width:100%;max-width:440px;
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:24px;padding:40px;
  box-shadow:0 24px 80px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04);
}
.login-logo{display:flex;align-items:center;gap:14px;margin-bottom:32px}
.logo-hex{
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,#4f8ef7,#7c6af5);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;flex-shrink:0;
  box-shadow:0 4px 20px rgba(79,142,247,.4);
}
.logo-text{font-family:var(--font-display);font-size:22px;font-weight:800;letter-spacing:-.5px}
.logo-sub{font-size:12px;color:var(--text3);letter-spacing:.5px;margin-top:1px}
.login-heading{font-family:var(--font-display);font-size:26px;font-weight:700;margin-bottom:6px;letter-spacing:-.5px}
.login-desc{font-size:14px;color:var(--text2);margin-bottom:28px;line-height:1.6}

.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text2);letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
.input-box{position:relative}
.input-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.input-box input{
  width:100%;padding:12px 14px 12px 42px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r);color:var(--text);font-size:15px;
  transition:border-color .2s,box-shadow .2s;outline:none;
}
.input-box input:focus{border-color:rgba(79,142,247,.5);box-shadow:0 0 0 3px rgba(79,142,247,.1)}
.input-box input::placeholder{color:var(--text3)}

.btn-primary{
  width:100%;padding:13px;border:none;border-radius:var(--r);
  background:linear-gradient(135deg,#4f8ef7,#7c6af5);
  color:#fff;font-size:15px;font-weight:600;letter-spacing:-.2px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;box-shadow:0 4px 20px rgba(79,142,247,.35);
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(79,142,247,.45)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}

.divider-line{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text3);font-size:13px}
.divider-line::before,.divider-line::after{content:'';flex:1;height:1px;background:var(--border)}

.social-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.btn-social{
  padding:11px;background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--r);color:var(--text2);font-size:13px;font-weight:500;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .2s;
}
.btn-social:hover{border-color:var(--border2);color:var(--text);background:var(--bg4)}

.login-footer{text-align:center;font-size:13px;color:var(--text2)}
.login-footer a{color:var(--accent);font-weight:500}
.login-footer a:hover{text-decoration:underline}
.row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.check-label{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);cursor:pointer}
.check-label input{accent-color:var(--accent)}
.forgot{font-size:13px;color:var(--accent);background:none;border:none;padding:0}
.forgot:hover{text-decoration:underline}

}
.topbar-logo{display:flex;align-items:center;gap:10px;margin-right:auto}

.topbar-logo span{font-family:var(--font-display);font-size:17px;font-weight:800;letter-spacing:-.3px}
.avatar-btn{

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const { useState, useEffect, useRef, useCallback } = React;

function useTyping(text, speed=30, trigger=true) {
  const [displayed, setDisplayed] = useState('');
  useEffect(() => {
    if (!trigger) return;
    setDisplayed('');
    let i = 0;
    const t = setInterval(() => {
      i++;
      setDisplayed(text.slice(0, i));
      if (i >= text.length) clearInterval(t);
    }, speed);
    return () => clearInterval(t);
  }, [text, trigger]);
  return displayed;
}

function ChatPanel({ idea }) {
  const [msgs, setMsgs] = useState([
    { role:'ai', text:`Hi! I'm your AI co-founder for **${idea.name}**. Ask me anything — pitch strategy, competitive analysis, pricing, fundraising, or growth tactics. I'm here to help you build.` }
  ]);
  const [input, setInput] = useState('');
  const [typing, setTyping] = useState(false);
  const [replyIdx, setReplyIdx] = useState(0);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}) },[msgs,typing]);

  function send() {
    const txt = input.trim();
    if (!txt) return;
    setMsgs(m=>[...m,{role:'user',text:txt}]);
    setInput('');
    setTyping(true);
    setTimeout(()=>{
      const reply = AI_REPLIES[replyIdx % AI_REPLIES.length].replace(/{name}/g, idea.name);
      setReplyIdx(r=>r+1);
      setMsgs(m=>[...m,{role:'ai',text:reply}]);
      setTyping(false);
    }, 1200 + Math.random()*600);
  }

  return (
    <div className="panel" style={{height:'100%'}}>
      <div className="panel-hdr">
        <div className="panel-eyebrow"><Icon d={Icons.message} size={12}/>AI Co-Founder</div>
        <h2 className="panel-title">AI Chat</h2>
        <p className="panel-sub">Strategy, research, and growth guidance for {idea.name}.</p>
      </div>
      <div className="chat-wrap">
        <div className="chat-msgs">
          {msgs.map((m,i)=>(
            <div className={`msg-row ${m.role}`} key={i}>
              <div className={`msg-av ${m.role}`}>{m.role==='ai'?'⬡':'A'}</div>
              <div className={`bubble ${m.role}`}>{m.text}</div>
            </div>
          ))}
          {typing && (
            <div className="msg-row ai">
              <div className="msg-av ai">⬡</div>
              <div className="bubble ai">
                <div className="typing-indicator"><span/><span/><span/></div>
              </div>
            </div>
          )}
          <div ref={bottomRef}/>
        </div>
        <div className="chat-input-bar">
          <input ref={inputRef} className="chat-input" placeholder="Ask about strategy, fundraising, competition…" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/>
          <button className="chat-send" onClick={send}>
            <Icon d={Icons.send} size={14} stroke="#fff"/>
            Send
          </button>
        </div>
      </div>
    </div>
  );
}

function DocsPanel({ idea }) {
  const [active, setActive] = useState(null);
  const docs = [
    {icon:'📊',name:'Pitch Deck',desc:'12-slide investor presentation'},
    {icon:'📝',name:'Business Plan',desc:'Full 20-page business document'},
    {icon:'⚖️',name:'Term Sheet',desc:'Standard investment term sheet'},
    {icon:'🤝',name:'NDA Template',desc:'Mutual non-disclosure agreement'},
    {icon:'💼',name:'Investor Update',desc:'Monthly LP/investor memo'},
    {icon:'🏢',name:'One-Pager',desc:'Executive summary for partners'},
  ];
  return (
    <div className="panel">
      <div className="panel-hdr">
        <div className="panel-eyebrow"><Icon d={Icons.file} size={12}/>Documentation</div>
        <h2 className="panel-title">Document Maker</h2>
        <p className="panel-sub">Generate investor-grade documents for {idea.name} in seconds.</p>
      </div>
      <div className="doc-grid">
        {docs.map(d=>(
          <div className={`doc-card${active===d.name?' sel':''}`} key={d.name} onClick={()=>setActive(d.name)} style={active===d.name?{borderColor:'rgba(79,142,247,.5)',background:'rgba(79,142,247,.06)'}:{}}>
            <div className="doc-icon">{d.icon}</div>
            <div className="doc-name">{d.name}</div>
            <div className="doc-desc">{d.desc}</div>
          </div>
        ))}
      </div>
      {active && (
        <div className="card fade-up" style={{border:'1px solid rgba(79,142,247,.2)',background:'rgba(79,142,247,.04)'}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
            <div className="card-title" style={{margin:0}}>Generating: {active} for {idea.name}</div>
            <button className="btn-primary" style={{width:'auto',padding:'8px 20px',fontSize:13}} onClick={()=>alert(`${active} for ${idea.name} would download here!`)}>
              <Icon d={Icons.arrowRight} size={14} stroke="currentColor"/>
              Download
            </button>
          </div>
          <p>Your document will be tailored with {idea.name}'s specific market data, financial projections, and business model. Estimated generation time: 8 seconds.</p>
        </div>
      )}
      {!active && <p style={{fontSize:14,color:'var(--text3)',textAlign:'center',padding:'20px 0'}}>Select a document type above to generate it</p>}
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// PAGE: DASHBOARD
// ─────────────────────────────────────────────────────────────────────────────
function DashboardPage({ idea, onBack, onLogout }) {
  const [activeMenu, setActiveMenu] = useState('market');

  const panels = {
    market: <MarketPanel idea={idea}/>,
    business: <BusinessPanel idea={idea}/>,
    pitch: <PitchPanel idea={idea}/>,
    financial: <FinancialPanel idea={idea}/>,
    branding: <BrandingPanel idea={idea}/>,
    roadmap: <RoadmapPanel idea={idea}/>,
    chat: <ChatPanel idea={idea}/>,
    docs: <DocsPanel idea={idea}/>,
  };

  return (
    <div className="dash-shell page">
      {/* Top bar */}
      <div className="dash-topbar">
        <div className="dash-topbar-brand">
          <div className="logo-hex" style={{width:28,height:28,borderRadius:7,fontSize:13}}>⬡</div>
          <span>NexusAI</span>
        </div>
        <div className="startup-crumb">
          <span className="crumb-sep" style={{color:'var(--text3)',margin:'0 6px'}}>›</span>
          <span className="startup-emoji-sm">{idea.emoji}</span>
          <span className="startup-name-sm">{idea.name}</span>
        </div>
        <div className="topbar-actions">
          <button className="icon-btn" title="Back to ideas" onClick={onBack}>
            <Icon d={Icons.arrowLeft} size={14}/>
          </button>
          <button className="icon-btn" title="Settings">
            <Icon d={Icons.settings} size={14}/>
          </button>
          <button className="avatar-btn" onClick={onLogout} title="Sign out">A</button>
        </div>
      </div>

      <div className="dash-body">
        {/* Sidebar */}
        <aside className="sidebar">
          <div className="sidebar-idea">
            <div className="sidebar-idea-emoji">{idea.emoji}</div>
            <div className="sidebar-idea-name">{idea.name}</div>
            <div className="sidebar-idea-tag">{idea.tag}</div>
          </div>
          <div className="sidebar-section-label">Workspace</div>
          {MENU_ITEMS.map(m=>(
            <button key={m.id} className={`nav-link${activeMenu===m.id?' active':''}`} onClick={()=>setActiveMenu(m.id)}>
              <Icon d={m.icon} size={15}/>
              {m.label}
            </button>
          ))}
        </aside>

        {/* Content */}
        <main className="main" key={activeMenu}>
          {panels[activeMenu]}
        </main>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ROOT APP
// ─────────────────────────────────────────────────────────────────────────────
function App() {
  const [page, setPage] = useState('login');
  const [selectedDomains, setSelectedDomains] = useState([]);
  const [selectedIdea, setSelectedIdea] = useState(null);

  function handleLogin() { setPage('home'); }
  function handleLogout() { setPage('login'); setSelectedIdea(null); setSelectedDomains([]); }
  function handleGenerate(domains) { setSelectedDomains(domains); setPage('ideas'); }
  function handleSelectIdea(idea) { setSelectedIdea(idea); setPage('dashboard'); }
  function handleBackToHome() { setPage('home'); }
  function handleBackToIdeas() { setPage('ideas'); }

  return (
    <>
      <style>{css}</style>
      {page === 'login'     && <LoginPage onLogin={handleLogin}/>}
      {page === 'home'      && <HomePage onGenerate={handleGenerate} onLogout={handleLogout}/>}
      {page === 'ideas'     && <IdeasPage selected={selectedDomains} onSelect={handleSelectIdea} onBack={handleBackToHome} onLogout={handleLogout}/>}
      {page === 'dashboard' && selectedIdea && <DashboardPage idea={selectedIdea} onBack={handleBackToIdeas} onLogout={handleLogout}/>}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
